<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .cell{display:flex;align-items:baseline;gap:14px}
  .w{font-size:34px;line-height:1}

<div class="grid">

  <div class="cell"><div class="w" style="font-weight:500">Aa</div><div class="lbl">Medium · 500<br>labels, nav</div></div>
  <div class="cell"><div class="w" style="font-weight:600">Aa</div><div class="lbl">SemiBold · 600<br>titles</div></div>
  <div class="cell"><div class="w" style="font-weight:700">Aa</div><div class="lbl">Bold · 700<br>page title, metrics</div></div>
</div>
<div style="margin-top:18px;font-size:13px;color:var(--color-text-muted)">IBM Plex Sans — Google Fonts</div>
</body></html>
