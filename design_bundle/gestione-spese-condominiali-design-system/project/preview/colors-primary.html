<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--color-bg)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .sw{border-radius:var(--radius-lg);overflow:hidden;border:1px solid rgba(0,0,0,.08);background:var(--color-surface)}
  .chip{height:72px;display:flex;align-items:flex-end;padding:8px 10px}
  .meta{padding:8px 10px}
  .name{font-size:13px;font-weight:700;color:var(--color-text)}
  .hex{font-size:12px;color:var(--color-text-muted);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#01696f"></div><div class="meta"><div class="name">primary</div><div class="hex">#01696f</div></div></div>
  <div class="sw"><div class="chip" style="background:#0c4e54"></div><div class="meta"><div class="name">primary-hover</div><div class="hex">#0c4e54</div></div></div>
  <div class="sw"><div class="chip" style="background:#cedcd8"></div><div class="meta"><div class="name">primary-highlight</div><div class="hex">#cedcd8</div></div></div>
</div>
</body></html>
