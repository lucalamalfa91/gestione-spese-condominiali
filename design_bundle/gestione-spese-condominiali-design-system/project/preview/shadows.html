<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:26px;background:var(--color-bg)}
  .row{display:flex;gap:26px;align-items:center}
  .item{text-align:center}
  .box{width:120px;height:72px;background:var(--color-surface);border:1px solid rgba(0,0,0,.08);border-radius:var(--radius-xl)}
  .name{font-size:12px;font-weight:700;color:var(--color-text);margin-top:12px}
  .val{font-size:11px;color:var(--color-text-muted)}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(40,37,29,.06)"></div><div class="name">shadow-sm</div><div class="val">cards, menus</div></div>
  <div class="item"><div class="box" style="box-shadow:0 8px 32px rgba(0,0,0,.12)"></div><div class="name">shadow-menu</div><div class="val">dropdowns, sheets</div></div>
  <div class="item"><div class="box" style="box-shadow:0 8px 24px rgba(1,105,111,.28);background:var(--color-primary)"></div><div class="name">shadow-fab</div><div class="val">teal FAB</div></div>
</div>
</body></html>
