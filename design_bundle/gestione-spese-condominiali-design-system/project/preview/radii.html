<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--color-bg)}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{text-align:center}
  .box{background:var(--color-primary-highlight);border:1px solid color-mix(in srgb,var(--color-primary) 28%,transparent);width:84px;height:84px}
  .name{font-size:12px;font-weight:700;color:var(--color-text);margin-top:8px}
  .val{font-size:11px;color:var(--color-text-muted)}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:.5rem"></div><div class="name">md</div><div class="val">.5rem / 8px</div></div>
  <div class="item"><div class="box" style="border-radius:.75rem"></div><div class="name">lg</div><div class="val">.75rem / 12px</div></div>
  <div class="item"><div class="box" style="border-radius:1rem"></div><div class="name">xl</div><div class="val">1rem / 16px</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="name">full</div><div class="val">9999px</div></div>
</div>
</body></html>
