<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--color-bg)}
  .btn{min-height:44px;padding:.8rem 1rem;display:inline-flex;align-items:center;gap:.55rem;border-radius:var(--radius-lg);border:1px solid rgba(0,0,0,.08);font-weight:700;font-size:var(--text-sm)}
  .btn-primary{background:var(--color-primary);color:var(--color-text-inverse);border-color:transparent}
  .btn-primary.hover{background:var(--color-primary-hover);transform:translateY(-1px)}
  .btn-secondary{background:var(--color-surface-offset);color:var(--color-text)}
  .btn-danger{background:var(--color-error-highlight);color:var(--color-error);border-color:transparent}
  .btn-link{background:none;border:none;color:var(--color-primary);font-weight:700}
  .btn[disabled]{opacity:.65}
  .grp{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  svg{width:18px;height:18px}
</style></head><body>
<div class="grp">
  <button class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Nuovo dovuto</button>
  <button class="btn btn-primary hover">Salva (hover)</button>
  <button class="btn btn-primary" disabled>Disabilitato</button>
</div>
<div class="grp">
  <button class="btn btn-secondary">Esporta JSON</button>
  <button class="btn btn-danger">Elimina casa</button>
  <button class="btn btn-link">+ casa</button>
</div>
</body></html>
