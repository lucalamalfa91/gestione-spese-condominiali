<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--color-bg)}
  .row{display:flex;gap:14px;align-items:stretch}
  .sw{flex:1;border-radius:var(--radius-lg);border:1px solid rgba(0,0,0,.08);padding:14px;display:flex;flex-direction:column;gap:6px;justify-content:flex-end;min-height:90px}
  .name{font-size:13px;font-weight:700}
  .hex{font-size:12px;font-variant-numeric:tabular-nums;opacity:.75}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#28251d"><div class="name" style="color:#f9f8f4">text</div><div class="hex" style="color:#f9f8f4">#28251d</div></div>
  <div class="sw" style="background:#7a7974"><div class="name" style="color:#fff">text-muted</div><div class="hex" style="color:#fff">#7a7974</div></div>
  <div class="sw" style="background:#f9f8f4;border-color:#dcd9d5"><div class="name" style="color:#28251d">text-inverse</div><div class="hex" style="color:#7a7974">#f9f8f4</div></div>
  <div class="sw" style="background:#dcd9d5"><div class="name" style="color:#28251d">divider</div><div class="hex" style="color:#28251d">#dcd9d5</div></div>
</div>
</body></html>
