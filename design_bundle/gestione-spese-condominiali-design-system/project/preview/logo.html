<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--color-bg);display:flex;align-items:center;gap:40px}
  .brand{display:flex;align-items:center;gap:.85rem}
  .logo{width:48px;height:48px;border-radius:12px;background:var(--color-primary-highlight);color:var(--color-primary);display:grid;place-items:center}
  .brand-text strong{display:block;font-size:16px;color:var(--color-text)}
  .brand-text span{font-size:13px;color:var(--color-text-muted)}
  .mark{width:44px;height:44px;color:var(--color-primary)}
</style></head><body>
<div class="brand">
  <div class="logo"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V8.5L12 4l8 4.5V20"/><path d="M8 20v-6h8v6"/></svg></div>
  <div class="brand-text"><strong>Condominio</strong><span>Gestione spese</span></div>
</div>
<svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V8.5L12 4l8 4.5V20"/><path d="M8 20v-6h8v6"/></svg>
</body></html>
