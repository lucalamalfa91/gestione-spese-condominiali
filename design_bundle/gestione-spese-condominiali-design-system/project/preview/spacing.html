<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--color-bg)}
  .row{display:flex;gap:10px;align-items:flex-end}
  .item{text-align:center}
  .bar{background:var(--color-primary);border-radius:3px}
  .name{font-size:11px;font-weight:700;color:var(--color-text);margin-top:8px}
  .val{font-size:10px;color:var(--color-text-muted)}
</style></head><body>
<div class="row">
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="name">2</div><div class="val">.5rem</div></div>
  <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="name">3</div><div class="val">.75rem</div></div>
  <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="name">4</div><div class="val">1rem</div></div>
  <div class="item"><div class="bar" style="width:20px;height:20px"></div><div class="name">5</div><div class="val">1.25rem</div></div>
  <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="name">6</div><div class="val">1.5rem</div></div>
  <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="name">8</div><div class="val">2rem</div></div>
</div>
</body></html>
