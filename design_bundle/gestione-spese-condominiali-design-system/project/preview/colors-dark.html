<!DOCTYPE html><html lang="it" data-theme="dark"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#171614}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid #262523;background:#1c1b19}
  .chip{height:54px}
  .meta{padding:7px 9px}
  .name{font-size:12px;font-weight:700;color:#cdccca}
  .hex{font-size:11px;color:#979691;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#171614"></div><div class="meta"><div class="name">bg</div><div class="hex">#171614</div></div></div>
  <div class="sw"><div class="chip" style="background:#1c1b19"></div><div class="meta"><div class="name">surface</div><div class="hex">#1c1b19</div></div></div>
  <div class="sw"><div class="chip" style="background:#201f1d"></div><div class="meta"><div class="name">surface-2</div><div class="hex">#201f1d</div></div></div>
  <div class="sw"><div class="chip" style="background:#4f98a3"></div><div class="meta"><div class="name">primary</div><div class="hex">#4f98a3</div></div></div>
  <div class="sw"><div class="chip" style="background:#313b3b"></div><div class="meta"><div class="name">prim-hl</div><div class="hex">#313b3b</div></div></div>
</div>
</body></html>
