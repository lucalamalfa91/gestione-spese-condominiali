<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--color-bg);color:var(--color-text)}
  .row{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--color-divider)}
  .row:last-child{border-bottom:none}
  .tok{width:88px;font-size:12px;color:var(--color-text-muted);font-variant-numeric:tabular-nums}
  .spec{flex:1;line-height:1.1}
</style></head><body>
  <div class="row"><div class="tok">text-xl</div><div class="spec" style="font-size:32px;font-weight:700;letter-spacing:-.01em">Riepilogo annualità</div></div>
  <div class="row"><div class="tok">text-lg</div><div class="spec" style="font-size:24px;font-weight:700">Nuovo dovuto</div></div>
  <div class="row"><div class="tok">text-base</div><div class="spec" style="font-size:18px;font-weight:400">Registra quote per esercizio fiscale.</div></div>
  <div class="row"><div class="tok">text-sm</div><div class="spec" style="font-size:16px;font-weight:500">Dovuti e versamenti</div></div>
  <div class="row"><div class="tok">text-xs</div><div class="spec" style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-muted)">Esercizio fiscale</div></div>
</body></html>
