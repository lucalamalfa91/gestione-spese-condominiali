<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestione Spese Condominiali — UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="Data.jsx"></script>
  <script type="text/babel" src="Login.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="Overview.jsx"></script>
  <script type="text/babel" src="Movimenti.jsx"></script>
  <script type="text/babel" src="Settings.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const [authed, setAuthed] = React.useState(false);
      const [email, setEmail] = React.useState('mario.rossi@email.it');
      const [view, setView] = React.useState('panoramica');
      const [subview, setSubview] = React.useState('dovuti');
      const [houses, setHouses] = React.useState(() => JSON.parse(JSON.stringify(SAMPLE_HOUSES)));
      const [selectedId, setSelectedId] = React.useState('h1');

      const toggleTheme = () => {
        const el = document.documentElement;
        el.dataset.theme = el.dataset.theme === 'dark' ? 'light' : 'dark';
      };
      React.useEffect(() => {
        document.body.classList.toggle('authenticated', authed);
      }, [authed]);

      const house = houses.find((h) => h.id === selectedId) || houses[0];

      const goTo = (v, sv) => { setView(v); if (sv) setSubview(sv); };

      const addDue = (due) => setHouses((hs) => hs.map((h) => {
        if (h.id !== selectedId) return h;
        const periods = h.periods.map((p) => p.label === due.period ? { ...p, due: p.due + due.amount } : p);
        return { ...h, dues: [...h.dues, due], periods };
      }));
      const addPayment = (pay) => setHouses((hs) => hs.map((h) => {
        if (h.id !== selectedId) return h;
        const periods = h.periods.map((p) => p.label === pay.period ? { ...p, paid: p.paid + pay.amount } : p);
        return { ...h, payments: [...h.payments, pay], periods };
      }));

      if (!authed) {
        return <Login onLogin={(e) => { setEmail(e); setAuthed(true); }} onToggleTheme={toggleTheme} />;
      }

      return (
        <Shell view={view} setView={setView} houses={houses} selectedId={selectedId}
          setSelectedId={setSelectedId} email={email} onToggleTheme={toggleTheme}
          onLogout={() => setAuthed(false)}>
          {view === 'panoramica' && <Overview house={house} goTo={goTo} />}
          {view === 'movimenti' && <Movimenti house={house} subview={subview} setSubview={setSubview} addDue={addDue} addPayment={addPayment} />}
          {view === 'dati' && <Dati />}
          {view === 'impostazioni' && <Impostazioni houses={houses} selectedId={selectedId} setSelectedId={setSelectedId} email={email} />}
        </Shell>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
